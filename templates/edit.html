<h1>Update Student</h1>

<form method="POST">
    Name:
    <input type="text" name="name" value="{{ student['name'] }}">
    <br>

    Email:
    <input type="text" name="email" value="{{ student['email'] }}">
    <br>

    Department:
    <input type="text" name="department" value="{{ student['department'] }}">
    <br>

    <button type="submit">UPDATE</button>

</form>
