<h1> Student List </h1>

<a href = "/add" > Add Student </a>

<table>

<tr>
<th> Name </th>
<th> Email </th>
<th> Department </th>
<th> Actions </th>
</tr>

{% for student in students %}

<tr>

<td> {{ student ["id"] }} </td >
<td> {{ student ["name"] }} </td >
<td> {{ student ["email"] }} </td>
<td> {{ student ["department"] }} </td>

<td>
<a href = "/edit/{{student['id']}}" > Edit </a>
<a href = "/delete/{{student['id']}}" > Delete </a>
</td >

</tr >

{% endfor %}

</table >
